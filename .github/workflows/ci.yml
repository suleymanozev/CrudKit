name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crudkit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CrudKit.slnx

      - name: Build
        run: dotnet build CrudKit.slnx --no-restore

      - name: Unit & API Tests
        run: dotnet test CrudKit.slnx --no-build -v m --filter "FullyQualifiedName!~Integration"

      - name: Integration Tests (SQLite + PostgreSQL)
        run: dotnet test tests/CrudKit.Integration.Tests/ --no-build -v m
