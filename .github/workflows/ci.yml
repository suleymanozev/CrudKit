name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build CrudKit.slnx
      - name: Unit & API Tests
        run: dotnet test CrudKit.slnx --no-build -v m --filter "FullyQualifiedName!~Integration" --logger "trx;LogFileName=unit-tests.trx" -- RunConfiguration.MaxCpuCount=0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: warn

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crudkit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build tests/CrudKit.Integration.Tests/
      - name: Integration Tests (SQLite + PostgreSQL)
        run: dotnet test tests/CrudKit.Integration.Tests/ --no-build -v m --logger "trx;LogFileName=integration-tests.trx" -- RunConfiguration.MaxCpuCount=0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: warn

  report:
    needs: [unit-tests, integration-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: unit-results
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: integration-test-results
          path: integration-results
        continue-on-error: true

      - name: Test Report
        uses: dorny/test-reporter@v1
        id: test-report
        if: hashFiles('**/*.trx') != ''
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx

      - name: Test Summary
        if: steps.test-report.outputs.passed != ''
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Passed:** ${{ steps.test-report.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Failed:** ${{ steps.test-report.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skipped:** ${{ steps.test-report.outputs.skipped }}" >> $GITHUB_STEP_SUMMARY

      - name: Update Test Badge
        if: github.ref == 'refs/heads/main' && steps.test-report.outputs.passed != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: crudkit-tests.json
          label: tests
          message: ${{ steps.test-report.outputs.passed }} passed
          color: ${{ steps.test-report.outputs.failed == '0' && 'brightgreen' || 'red' }}
