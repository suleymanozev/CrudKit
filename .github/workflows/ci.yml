name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crudkit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CrudKit.slnx

      - name: Build
        run: dotnet build CrudKit.slnx --no-restore

      - name: Unit & API Tests
        run: dotnet test CrudKit.slnx --no-build -v m --filter "FullyQualifiedName!~Integration" --logger "trx;LogFileName=unit-tests.trx"

      - name: Integration Tests (SQLite + PostgreSQL)
        run: dotnet test tests/CrudKit.Integration.Tests/ --no-build -v m --logger "trx;LogFileName=integration-tests.trx"

      - name: Test Report
        uses: dorny/test-reporter@v1
        id: test-report
        if: always()
        with:
          name: Test Results
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx

      - name: Test Summary
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Passed:** ${{ steps.test-report.outputs.passed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Failed:** ${{ steps.test-report.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skipped:** ${{ steps.test-report.outputs.skipped }}" >> $GITHUB_STEP_SUMMARY

      - name: Update Test Badge
        if: always() && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: crudkit-tests.json
          label: tests
          message: ${{ steps.test-report.outputs.passed }} passed
          color: ${{ steps.test-report.outputs.failed == '0' && 'brightgreen' || 'red' }}
